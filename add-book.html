<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap-dashboard</title>

    <!-- bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- link file CSS -->
    <link rel="stylesheet" href="style/index.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
        <div class="container-fluid">
            <img src="img/duck.png" href="#" alt="icona papera">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Catalogo libri</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Anagrafia utenti</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Storico prestiti</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Help</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Cerca..." aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit">Cerca</button>
                </form>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <h2 class="mt-4">Nuovo libro</h2>
            <form>
                <!-- Nome/cognome autore -->
                <div class="row">
                    <div class="col-6 mt-4">
                        <label for="nome" class="form-label">Nome Autore</label>
                        <input type="text" class="form-control" id="nome" placeholder="Inserisci il nome dell'autore"
                            required>
                    </div>
                    <div class="col-6">
                        <label for="cognome" class="form-label">Cognome Autore</label>
                        <input type="text" class="form-control" id="cognome"
                            placeholder="Inserisci il cognome dell'autore" required>
                    </div>
                </div>
                <!-- Titolo -->
                <div class="col-12 mt-4">
                    <label for="titolo" class="form-label">Titolo</label>
                    <input type="text" class="form-control" id="titolo" placeholder="Inserisci il titolo del libro"
                        required>
                    <div class="explanation text-muted">Titolo versione italiana</div>
                </div>

                <!-- Altre informazioni -->
                <div class="row mt-4">
                    <div class="col-12 col-md-4">
                        <label for="genere" class="form-label">Genere</label>
                        <select required class="form-select" id="genere">
                            <option selected disabled value="">Scegli il genere</option>
                            <option value="1">ciao</option>
                            <option value="2">come</option>
                            <option value="3">va?</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label for="anno" class="form-label">Anno di Pubblicazione</label>
                        <input type="number" class="form-control" id="anno" placeholder="Inserisci l'anno" required min="1800"
                            max="2026" step="10">
                    </div>
                    <div class="col-12 col-md-4">
                        <label for="isbn" class="form-label">ISBN#</label>
                        <input type="text" class="form-control" id="isbn" placeholder="Inserisci il codice ISBN#" required
                            pattern="[A-Za-z]{5}">
                        <!--Pattern è un attributo utilizzato all'interno dei tag input per definire dei paramemetri che il valore inserito 
                        dall'utente deve rispettare per essere considerato valido.
                        nel nostro esempio tra le parentesi quadre si trovano i range dei caratteri utilizzabili mentre tra le parentesi 
                        tonde troviamo il numero dei caratteri inseribili-->
                    </div>
                </div>

                <hr class="my-5">
                <!-- Note -->
                <div class="col-12">
                    <label for="note" class="form-label">Note</label>
                    <textarea class="form-control" id="note" rows="3" placeholder="Inserisci eventuali note sul libro"></textarea>
                </div>
                <div class="my-3">
                    <input type="checkbox" class="form-checkbox" id="disponibile-in-digitale">
                    <label for="disponibile-in-digitale" class="form-checkbox">Disponibile anche in digitale</label>
                </div>
                <button type="submit" class="btn btn-primary">Aggiungi Libro</button>

            </form>
        </div>

    </main>

    <!-- script JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
